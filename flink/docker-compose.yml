services:
  jobmanager:
    build:
      context: ./
      dockerfile: Dockerfile
    hostname: jobmanager
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      - |
        FLINK_PROPERTIES=
        jobmanager.archive.expiration-time: 1 hour
        historyserver.archive.clean-up: false
        # Path where completed jobs are stored
        jobmanager.archive.fs.dir: file:///opt/flink/completed-jobs
      - HADOOP_CONF_DIR=/opt/hadoop/etc/hadoop
      - HADOOP_CLASSPATH=/opt/hadoop/etc/hadoop
      - JOB_MANAGER_RPC_ADDRESS=jobmanager
    networks:
      - hdfs_asvsp
    volumes:
      - ../airflow/files/flink/my_jobs:/opt/flink/usrlib
      - flink_history:/opt/flink/completed-jobs
      
  taskmanager:
    build:
      context: ./
      dockerfile: Dockerfile
    hostname: taskmanager
    command: taskmanager
    environment:
      - HADOOP_CONF_DIR=/opt/hadoop/etc/hadoop
      - HADOOP_CLASSPATH=/opt/hadoop/etc/hadoop
      - JOB_MANAGER_RPC_ADDRESS=jobmanager
      - TASK_MANAGER_NUMBER_OF_TASK_SLOTS=2
    depends_on:
      - jobmanager
    deploy:
      replicas: 2
    networks:
      - hdfs_asvsp
    volumes:
      - ../airflow/files/flink/my_jobs:/opt/flink/usrlib
      - flink_history:/opt/flink/completed-jobs

volumes:
  flink_history:

networks:
  hdfs_asvsp:
    name: hdfs_asvsp
    external: true