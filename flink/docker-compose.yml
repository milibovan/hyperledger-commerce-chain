services:
  jobmanager:
    image: flink:1.20
    hostname: jobmanager
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      - HADOOP_CONF_DIR=/opt/hadoop/etc/hadoop
      - HADOOP_CLASSPATH=/opt/hadoop/etc/hadoop
      - JOB_MANAGER_RPC_ADDRESS=jobmanager
    networks:
      - data-lake_asvsp
      
  taskmanager:
    image: flink:1.20
    hostname: taskmanager
    command: taskmanager
    environment:
      - HADOOP_CONF_DIR=/opt/hadoop/etc/hadoop
      - HADOOP_CLASSPATH=/opt/hadoop/etc/hadoop
      - JOB_MANAGER_RPC_ADDRESS=jobmanager
      - TASK_MANAGER_NUMBER_OF_TASK_SLOTS=2
    depends_on:
      - jobmanager
    deploy:
      replicas: 2
    networks:
      - data-lake_asvsp