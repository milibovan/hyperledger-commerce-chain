version: '3.7'

volumes:
  raft0.example.com:
  raft1.example.com:
  raft2.example.com:
  peer0.org1.example.com:
  peer0.org2.example.com:
  peer0.org3.example.com:
  peer1.org1.example.com:
  peer1.org2.example.com:
  peer1.org3.example.com:
  peer2.org1.example.com:
  peer2.org2.example.com:
  peer2.org3.example.com:
  couchdb_data0:
  couchdb_data1:
  couchdb_data2:
  couchdb_data3:
  couchdb_data4:
  couchdb_data5:
  couchdb_data6:
  couchdb_data7:
  couchdb_data8:
  fabric-ca-orderer-data:
  fabric-ca-org1data:
  fabric-ca-org2data:
  fabric-ca-org3data:

networks:
  test:
    name: hyperledger-commerce-chain

services:
  ca.orderer.example.com:
    image: hyperledger/fabric-ca:latest
    container_name: ca.orderer.example.com
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=OrdererCA
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=7054
    ports:
      - "7054:7054"
    volumes:
      - ../fabric-ca-server-orderer.yaml:/etc/hyperledger/fabric-ca-server-config.yaml
      - fabric-ca-orderer-data:/etc/hyperledger/fabric-ca-server
    command: sh -c 'fabric-ca-server start -b admin:adminpw -c /etc/hyperledger/fabric-ca-server-config.yaml'
    networks:
      - test

  ca.org1.example.com:
    image: hyperledger/fabric-ca:latest
    container_name: ca.org1.example.com
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=Org1CA
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=7055
    ports:
      - "7055:7055"
    volumes:
      - ../fabric-ca-server-org1.yaml:/etc/hyperledger/fabric-ca-server-config.yaml
      - fabric-ca-org1-data:/etc/hyperledger/fabric-ca-server
    command: sh -c 'fabric-ca-server start -b admin:adminpw -c /etc/hyperledger/fabric-ca-server-config.yaml'
    networks:
      - test

  ca.org2.example.com:
    image: hyperledger/fabric-ca:latest
    container_name: ca.org2.example.com
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=Org2CA
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=7056
    ports:
      - "7056:7056"
    volumes:
      - ../fabric-ca-server-org2.yaml:/etc/hyperledger/fabric-ca-server-config.yaml
      - fabric-ca-org2-data:/etc/hyperledger/fabric-ca-server
    command: sh -c 'fabric-ca-server start -b admin:adminpw -c /etc/hyperledger/fabric-ca-server-config.yaml'
    networks:
      - test

  ca.org3.example.com:
    image: hyperledger/fabric-ca:latest
    container_name: ca.org3.example.com
    environment:
      - FABRIC_CA_HOME=/etc/hyperledger/fabric-ca-server
      - FABRIC_CA_SERVER_CA_NAME=Org3CA
      - FABRIC_CA_SERVER_TLS_ENABLED=true
      - FABRIC_CA_SERVER_PORT=7057
    ports:
      - "7057:7057"
    volumes:
      - ../fabric-ca-server-org3.yaml:/etc/hyperledger/fabric-ca-server-config.yaml
      - fabric-ca-org3-data:/etc/hyperledger/fabric-ca-server
    command: sh -c 'fabric-ca-server start -b admin:adminpw -c /etc/hyperledger/fabric-ca-server-config.yaml'
    networks:
      - test