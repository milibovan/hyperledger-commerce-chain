version: '3.7'

volumes:
  couchdb_data0:
  couchdb_data1:
  couchdb_data2:
  couchdb_data3:
  couchdb_data4:
  couchdb_data5:
  couchdb_data6:
  couchdb_data7:
  couchdb_data8:

networks:
  hdfs_asvsp:
    name: hdfs_asvsp
    external: true

services:
  couchdb0:
    image: couchdb:latest
    container_name: couchdb0
    ports:
      - "5984:5984"  # FIXED: Maps host 5984 to container 5984
    environment:
      COUCHDB_USER: admin
      COUCHDB_PASSWORD: password
    volumes:
      - couchdb_data0:/opt/couchdb/data
    networks:
      - hdfs_asvsp

  couchdb1:
    image: couchdb:latest
    container_name: couchdb1
    ports:
      - "5985:5984"
    environment:
